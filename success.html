<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETATIX - E-Ticket Berhasil</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
:root {
  --primary: #4F46E5;
  --primary-dark: #3730A3;
  --primary-light: #818CF8;
  --primary-glow: rgba(79, 70, 229, 0.2);
  --bg-main: #F8FAFC;
  --card-bg: #FFFFFF;
  --card-border: #E2E8F0;
  --text-main: #1E293B;
  --text-muted: #64748B;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
  background: var(--bg-main);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  max-width: 480px;
  width: 100%;
  text-align: center;
}

/* ── Success Icon ── */
.success-checkmark {
  width: 80px;
  height: 80px;
  background: #10B981;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
  animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
}

.success-checkmark i {
  color: #fff;
  font-size: 40px;
  animation: checkDraw 0.5s ease 0.2s backwards;
}

@keyframes scaleIn {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}

@keyframes checkDraw {
  0% { opacity: 0; transform: scale(0.5); }
  100% { opacity: 1; transform: scale(1); }
}

.success-text h1 {
  font-size: 24px;
  font-weight: 800;
  color: var(--text-main);
  margin-bottom: 8px;
}

.success-text p {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 30px;
}

/* ── Ticket Card ── */
.ticket-card {
  background: var(--card-bg);
  border-radius: 24px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
  border: 1px solid var(--card-border);
  overflow: hidden;
  position: relative;
  text-align: left;
  animation: fadeUp 0.6s ease 0.2s backwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.ticket-header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  padding: 24px;
  color: #fff;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.ticket-header h2 {
  font-size: 20px;
  font-weight: 800;
}

.ticket-header .logo-img {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: #fff;
  padding: 4px;
}

.ticket-body {
  padding: 24px;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px dashed #E2E8F0;
}

.detail-row:last-of-type {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}

.detail-label {
  font-size: 12px;
  color: var(--text-muted);
  display: block;
  margin-bottom: 4px;
}

.detail-value {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-main);
  text-align: right;
  word-break: break-word;
}

/* ── QR Code Section ── */
.qr-section {
  padding: 24px;
  background: #F8FAFC;
  border-top: 1px dashed #E2E8F0;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* Effect lubang tiket di sisi kiri dan kanan */
.qr-section::before, .qr-section::after {
  content: '';
  position: absolute;
  top: 0;
  width: 24px;
  height: 24px;
  background: var(--bg-main);
  border-radius: 50%;
  transform: translateY(-50%);
}
.qr-section::before { left: -12px; }
.qr-section::after { right: -12px; }

.qr-img-box {
  background: #fff;
  padding: 12px;
  border-radius: 16px;
  border: 1px solid var(--card-border);
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

.qr-img-box img {
  width: 140px;
  height: 140px;
  display: block;
}

.qr-info {
  margin-top: 12px;
  font-size: 11px;
  color: var(--text-muted);
  font-family: monospace;
  letter-spacing: 1px;
}

/* ── Buttons ── */
.btn-group {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}

.btn {
  flex: 1;
  padding: 16px;
  border: none;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: 0.3s;
}

.btn-primary {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 4px 15px var(--primary-glow);
}

.btn-primary:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
}

.btn-secondary {
  background: #fff;
  color: var(--text-main);
  border: 1px solid var(--card-border);
}

.btn-secondary:hover {
  background: #F8FAFC;
  transform: translateY(-2px);
}

/* ── Print Settings ── */
@media print {
  body { background: #fff; padding: 0; }
  .container { max-width: 100%; }
  .success-checkmark, .success-text, .btn-group { display: none !important; }
  .ticket-card { box-shadow: none; border: none; }
}
</style>
</head>
<body>

<div class="container">

  <div class="success-checkmark">
    <i class="fa-solid fa-check"></i>
  </div>
  
  <div class="success-text">
    <h1>Pembayaran Berhasil!</h1>
    <p>E-tiket Anda telah diterbitkan. Tunjukkan tiket ini saat masuk area acara.</p>
  </div>

  <div class="ticket-card">
    
    <div class="ticket-header">
      <h2>NEVER LAND FEST 2026</h2>
      <img src="logo.png" alt="ETATIX" class="logo-img">
    </div>

    <div class="ticket-body">
      <div class="detail-row">
        <div>
          <span class="detail-label">Order ID</span>
          <span class="detail-value" id="no" style="color: var(--primary);">-</span>
        </div>
        <i class="fa-solid fa-ticket" style="color: var(--primary); font-size: 20px;"></i>
      </div>

      <div class="detail-row">
        <div>
          <span class="detail-label">Nama Pemesan</span>
          <span class="detail-value" id="nm">-</span>
        </div>
      </div>

      <div class="detail-row">
        <div>
          <span class="detail-label">E-mail</span>
          <span class="detail-value" id="em">-</span>
        </div>
      </div>

      <div class="detail-row">
        <div>
          <span class="detail-label">Kategori Tiket</span>
          <span class="detail-value" id="kt">-</span>
        </div>
      </div>

      <div class="detail-row">
        <div>
          <span class="detail-label">Total Pembayaran</span>
          <span class="detail-value" id="hg">Rp 0</span>
        </div>
      </div>
    </div>

    <div class="qr-section">
      <div class="qr-img-box">
        <!-- QR Code di-generate secara dinamis menggunakan API QRServer berdasarkan Order ID -->
        <img id="qrCodeImg" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=ETATIX-TICKET" alt="QR Code Tiket">
      </div>
      <div class="qr-info">Scan di pintu masuk</div>
    </div>

  </div>

  <div class="btn-group">
    <button class="btn btn-secondary" onclick="window.print()">
      <i class="fa-solid fa-print"></i> Print Tiket
    </button>
    <button class="btn btn-primary" onclick="location.href='index.html'">
      <i class="fa-solid fa-house"></i> Ke Beranda
    </button>
  </div>

</div>

<script>
// ── Ambil data dari localStorage (Sesuai Alur ETATIX) ──
const order = JSON.parse(localStorage.getItem('etatix_order') || '{}');
const orderId = localStorage.getItem('orderId') || ('NEVERLAND-' + Date.now());

const cart = order.cart || { items: [], totalPrice: 0 };
const totalStr = 'Rp ' + Number(cart.totalPrice || 0).toLocaleString('id-ID');
const kategoriStr = (cart.items || []).map(i => `${i.jenis} (x${i.qty})`).join(', ') || '-';

// ── Isi E-Tiket ──
document.getElementById('no').textContent = orderId;
document.getElementById('nm').textContent = order.nama || '-';
document.getElementById('em').textContent = order.email || '-';
document.getElementById('kt').textContent = kategoriStr;
document.getElementById('hg').textContent = totalStr;

// ── Generate QR Code Asli berdasarkan Order ID ──
const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(orderId + ' | ' + order.nama + ' | ' + kategoriStr)}`;
document.getElementById('qrCodeImg').src = qrUrl;
</script>

</body>
</html>
